<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiriScore — Bitcoin Privacy Scorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header>
  <a class="wordmark" href="#">
    <div class="wordmark-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <span class="wordmark-text"><span class="siri">Siri</span><span class="score-part">Score</span></span>
  </a>
  <nav class="nav-links">
    <a href="https://github.com/bitcoin/bips" target="_blank" rel="noopener">Docs</a>
    <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
    <a href="#" id="learn-link">Learn</a>
  </nav>
</header>

<!-- ── Page ────────────────────────────────────────────────── -->
<div class="page">

  <!-- Input zone -->
  <section class="input-zone">
    <h1>Check your transaction</h1>
    <p class="subtitle" id="privacy-caption"></p>

    <div class="pill-tabs">
      <button class="pill active" data-tab="psbt">PSBT</button>
      <button class="pill" data-tab="rawtx">Raw Tx</button>
      <button class="pill" data-tab="txid">Txid</button>
    </div>

    <textarea id="tx-input" spellcheck="false"
      placeholder="cHNidP8BAH0CAAAAAbxLLf9+AYfqfF69QAQuETnL..."></textarea>

    <div class="error-banner" id="error-banner"></div>

    <button class="btn-analyse" id="btn-analyse">Analyse Transaction</button>

    <button class="import-labels" id="import-labels-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
        <line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>
      Import labels from Sparrow Wallet
    </button>
    <input type="file" id="file-input" accept=".json" />

    <label class="network-toggle">
      <input type="checkbox" id="network-checks" checked />
      <span>Enable network checks
        <span class="network-toggle-detail">(H3: address reuse, H4: UTXO age — queries mempool.space)</span>
      </span>
    </label>
  </section>

  <!-- Results zone -->
  <section class="results-zone" id="results-zone">

    <!-- Score card -->
    <div class="score-card">
      <div class="score-left">
        <div class="score-number" id="score-number">—</div>
        <div class="score-label">Privacy Score</div>
        <div class="verdict-pill" id="verdict-pill"></div>
      </div>
      <div class="score-right">
        <div class="gauge-wrap">
          <div class="gauge-bar">
            <div class="gauge-seg-red"></div>
            <div class="gauge-seg-amber"></div>
            <div class="gauge-seg-green"></div>
          </div>
          <div class="gauge-dot" id="gauge-dot"></div>
        </div>
        <div class="meta-chips" id="meta-chips"></div>
      </div>
    </div>

    <!-- Findings -->
    <div class="findings-section">
      <div class="section-head">
        <h2>Findings</h2>
        <span class="count-badge" id="findings-count"></span>
      </div>
      <div id="findings-list"></div>
    </div>

    <!-- Checks -->
    <div class="checks-section">
      <div class="section-head">
        <h2>Checks</h2>
        <span class="count-badge" id="checks-count"></span>
      </div>
      <div class="check-list" id="checks-list"></div>
    </div>

    <!-- Coin labels -->
    <div class="labels-section" id="labels-section" style="display:none">
      <div class="section-head">
        <h2>Coin labels</h2>
      </div>
      <div id="labels-list"></div>
    </div>

    <!-- What to do next -->
    <div class="next-card">
      <h3>What to do next</h3>
      <ol id="next-list"></ol>
    </div>

    <!-- Download -->
    <button class="btn-download" id="btn-download">Download report</button>

  </section>
</div>

<!-- ── Glossary overlay + panel ─────────────────────────────── -->
<div class="glossary-backdrop" id="glossary-backdrop"></div>

<aside class="glossary-panel" id="glossary-panel" aria-label="Bitcoin privacy glossary">
  <div class="glossary-header">
    <div>
      <div class="glossary-title">Bitcoin privacy glossary</div>
      <div class="glossary-subtitle">Terms used in SiriScore explained plainly.</div>
    </div>
    <button class="glossary-close" id="glossary-close" aria-label="Close glossary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <input class="glossary-search" id="glossary-search" type="text"
         placeholder="Search terms..." autocomplete="off" spellcheck="false" />

  <div class="glossary-list" id="glossary-list"></div>

  <div class="glossary-empty" id="glossary-empty" style="display:none">
    No terms match your search.
  </div>
</aside>

<script src="app.js"></script>
</body>
</html>
