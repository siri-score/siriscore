name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install -e ".[dev]"

      - name: Run tests
        run: python3 -m pytest -q --tb=short

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check scorer/ api/ tests/

      - name: Build wheel
        run: |
          pip install build
          python3 -m build --wheel
